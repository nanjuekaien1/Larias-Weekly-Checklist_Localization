name: Auto-Translate Locales

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      locale:
        description: "Single locale to translate (e.g. deDE). Leave blank for all 8."
        required: false
        default: ""
      dry_run:
        description: "Dry run – preview untranslated entries without calling the API"
        required: false
        type: boolean
        default: false
      model:
        description: "Claude model to use"
        required: false
        default: "claude-sonnet-4-5"

  # Fired by the main addon repo whenever enUS_Data.lua changes.
  repository_dispatch:
    types: [enUS-data-updated]

concurrency:
  group: auto-translate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      # ── 0. Resolve inputs (works for both workflow_dispatch and repository_dispatch) ──
      - name: Resolve run parameters
        id: params
        run: |
          # workflow_dispatch populates inputs.*; repository_dispatch uses client_payload.*
          LOCALE="${{ inputs.locale || github.event.client_payload.locale }}"
          MODEL="${{ inputs.model || github.event.client_payload.model }}"
          DRY_RUN="${{ inputs.dry_run || github.event.client_payload.dry_run }}"
          echo "locale=${LOCALE:-}"                >> "$GITHUB_OUTPUT"
          echo "model=${MODEL:-claude-sonnet-4-5}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN:-false}"         >> "$GITHUB_OUTPUT"

      # ── 1. Checkout locales repo ────────────────────────────────────────────
      - name: Checkout locales repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Checkout main addon repo (source of enUS*.lua) ──────────────────
      - name: Checkout main addon repo
        uses: actions/checkout@v4
        with:
          repository: Devbezos/Larias-Weekly-Checklist
          path: _main-addon
          token: ${{ secrets.ADDON_REPO_TOKEN }}

      # ── 3. Python ───────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      # ── 4. Translate data files (enUS_Data.lua -> *_Data.lua) ──────────────
      - name: Translate data files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS="--enus _main-addon/Locales/enUS_Data.lua --model ${{ steps.params.outputs.model }}"
          if [ -n "${{ steps.params.outputs.locale }}" ]; then
            ARGS="$ARGS --locale ${{ steps.params.outputs.locale }}"
          fi
          if [ "${{ steps.params.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -u scripts/auto_translate_data.py $ARGS

      # ── 6. Commit to a new branch ───────────────────────────────────────────
      - name: Commit translations to branch
        if: steps.params.outputs.dry_run != 'true'
        id: branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add locales/
          if git diff --cached --quiet; then
            echo "No locale changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCALE_LABEL="${{ steps.params.outputs.locale }}"
          if [ -z "$LOCALE_LABEL" ]; then LOCALE_LABEL="all-locales"; fi

          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          BRANCH="auto-translate/${LOCALE_LABEL}-${TIMESTAMP}"
          git checkout -b "$BRANCH"
          git commit -m "Auto-translate ${LOCALE_LABEL} – AI-generated, unverified terms flagged"
          git push origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"

      # ── 7. Open Pull Request ────────────────────────────────────────────────
      - name: Open Pull Request
        if: steps.branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCALE_LABEL="${{ steps.params.outputs.locale }}"
          if [ -z "$LOCALE_LABEL" ]; then LOCALE_LABEL="all locales"; fi
          DATE=$(date -u +%Y-%m-%d)

          BODY="Automated translation pass triggered by a change to \`enUS_Data.lua\`."$'\n\n'"All new entries are flagged with UNVERIFIED for native speaker review before merging."

          gh pr create \
            --title "Auto-translate ${LOCALE_LABEL} – ${DATE}" \
            --body "$BODY" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.branch.outputs.branch }}"
